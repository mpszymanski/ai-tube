<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#9b7aff"/>
      <stop offset="100%" stop-color="#4a28c4"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="512" height="512" rx="112" fill="url(#bg-grad)"/>
  <!-- Subtle top shine for depth -->
  <rect width="512" height="256" rx="112" fill="url(#shine)"/>
  <!-- White play triangle, centered and large -->
  <polygon points="168,152 168,360 384,256" fill="white" opacity="0.95"/>
</svg>
